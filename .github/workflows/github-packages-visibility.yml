name: Set GitHub Packages visibility

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  make-public:
    runs-on: ubuntu-latest
    steps:
      - name: Set npm package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for package_name in '%40digitizers%2Fsumit-react' 'sumit-react'; do
            echo "Trying package name: ${package_name}"
            if gh api --method PATCH \
              "/orgs/Digitizers/packages/npm/${package_name}/visibility" \
              -f visibility=public; then
              echo "Package visibility set to public for ${package_name}"
              exit 0
            fi
          done
          echo "Could not set package visibility with available package names" >&2
          exit 1
